name: SL Daily Scrum Report

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send to Mobile test channel instead of SL General'
        required: false
        default: 'false'

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send SL Daily Report
        shell: pwsh
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          if ("${{ github.event.inputs.test_mode }}" -eq "true") {
            pwsh -ExecutionPolicy Bypass -File daily_report.ps1 -TestMode
          } else {
            pwsh -ExecutionPolicy Bypass -File daily_report.ps1
          }
